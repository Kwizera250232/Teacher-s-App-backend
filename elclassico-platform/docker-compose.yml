services:
  postgres:
    image: postgres:16-alpine
    container_name: elclassico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elclassico
      POSTGRES_PASSWORD: elclassico_dev_password
      POSTGRES_DB: elclassico
    ports:
      - "5434:5432"
    volumes:
      - elclassico_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: elclassico-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - elclassico_redis_data:/data

volumes:
  elclassico_pg_data:
  elclassico_redis_data:
