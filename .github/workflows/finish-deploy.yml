name: Finish deploy (API + Vercel)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build student UI for /app/
        run: bash scripts/build-student-web-dist.sh

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SSH target
        id: ssh
        env:
          RAW_HOST: ${{ secrets.SSH_HOST }}
          RAW_USER: ${{ secrets.SSH_USER }}
          RAW_APP: ${{ secrets.BACKEND_APP_DIR }}
        run: |
          RAW="${RAW_HOST:-}"
          if [ -z "$RAW" ]; then RAW="$(printf '%s' 'OTMuMTI3LjE4Ni4yMTc=' | base64 -d)"; fi
          H="${RAW#ssh://}"; H="${H#https://}"; H="${H#http://}"; H="${H%%/*}"
          if [[ "$H" == *@* ]]; then H="${H#*@}"; fi
          H="${H%%:*}"
          USER="${RAW_USER:-root}"
          APP="${RAW_APP:-/home/umunsi/htdocs/studentapi.umunsi.com}"
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "user=$USER" >> "$GITHUB_OUTPUT"
          echo "app_dir=$APP" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        id: ssh_deploy
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ steps.ssh.outputs.user }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ steps.ssh.outputs.app_dir }}"
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            npm ci --omit=dev
            bash scripts/restart-production-api.sh "$APP_DIR"

      - name: Deploy via hook
        continue-on-error: true
        env:
          DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}
        run: |
          if [ -z "$DEPLOY_HOOK_SECRET" ]; then
            echo "DEPLOY_HOOK_SECRET not set — skip hook deploy"
            exit 0
          fi
          curl -fsS -X POST "https://studentapi.umunsi.com/api/hooks/redeploy" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_HOOK_SECRET" \
            -d '{}'

      - name: Deploy reminder
        if: steps.ssh_deploy.outcome != 'success'
        run: |
          echo "::error::VPS deploy did not succeed. Add GitHub secrets SSH_PRIVATE_KEY and SSH_USER (SSH_HOST optional)."
          echo "Manual: SSH to VPS, then: cd /home/umunsi/htdocs/studentapi.umunsi.com && git pull origin main && npm ci --omit=dev && bash scripts/restart-production-api.sh"

  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Push to Teacher-s-App-frontent
        continue-on-error: true
        env:
          FRONTEND_DEPLOY_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
        run: |
          if [ -z "$FRONTEND_DEPLOY_TOKEN" ]; then
            echo "FRONTEND_DEPLOY_TOKEN not set — skip frontend push"
            exit 0
          fi
          bash scripts/sync-student-web-to-frontend.sh

      - name: Vercel CLI deploy
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then exit 0; fi
          bash scripts/deploy-vercel-frontend.sh

      - name: Vercel deploy hook
        continue-on-error: true
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then exit 0; fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"

      - name: Frontend note
        run: |
          echo "student.umunsi.com updates when Teacher-s-App-frontent main is pushed."
          echo "Use frontend-deploy.bundle on VPS: see DEPLOY.md"

  verify:
    needs: [build, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          sleep 8
          BODY="$(curl -fsS "https://studentapi.umunsi.com/api/health")"
          echo "$BODY"
          echo "$BODY" | grep -q '6b65fed' || echo "::warning::API build still old — SSH deploy likely did not run."
          FEED="$(curl -s -o /dev/null -w '%{http_code}' https://studentapi.umunsi.com/api/composition-status/feed)"
          echo "composition-status/feed HTTP $FEED (want 401, not 404)"
          curl -fsS "https://studentapi.umunsi.com/app/" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || true
