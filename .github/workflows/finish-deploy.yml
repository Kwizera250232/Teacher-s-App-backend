name: Finish deploy (API + Vercel)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.version.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build student UI for /app/
        run: bash scripts/build-student-web-dist.sh

      - name: Write build id
        id: version
        run: echo "build_id=$(cat VERSION)" >> "$GITHUB_OUTPUT"

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        if: ${{ secrets.SSH_PRIVATE_KEY != '' && secrets.SSH_HOST != '' && secrets.SSH_USER != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.BACKEND_APP_DIR || '/home/umunsi/htdocs/studentapi.umunsi.com' }}"
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            npm ci --omit=dev
            pm2 restart studentapi || pm2 restart student-app-api || pm2 start index.js --name studentapi
            pm2 save

      - name: Deploy via hook
        if: ${{ secrets.DEPLOY_HOOK_SECRET != '' }}
        env:
          DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}
        run: |
          curl -fsS -X POST "https://studentapi.umunsi.com/api/hooks/redeploy" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_HOOK_SECRET" \
            -d '{}' || echo "::warning::Deploy hook failed (set DEPLOY_HOOK_SECRET on server .env too)"

      - name: SSH secrets missing
        if: ${{ secrets.SSH_PRIVATE_KEY == '' && secrets.DEPLOY_HOOK_SECRET == '' }}
        run: |
          echo "::warning::Add GitHub secrets SSH_HOST, SSH_USER, SSH_PRIVATE_KEY and/or DEPLOY_HOOK_SECRET"
          echo "Manual VPS: cd /home/umunsi/htdocs/studentapi.umunsi.com && git pull origin main && npm ci --omit=dev && pm2 restart studentapi"

  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Push to Teacher-s-App-frontent
        if: ${{ secrets.FRONTEND_DEPLOY_TOKEN != '' }}
        env:
          FRONTEND_DEPLOY_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
        run: bash scripts/sync-student-web-to-frontend.sh

      - name: Vercel CLI deploy
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/deploy-vercel-frontend.sh

      - name: Vercel deploy hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Frontend deploy skipped
        if: ${{ secrets.FRONTEND_DEPLOY_TOKEN == '' && secrets.VERCEL_TOKEN == '' && secrets.VERCEL_DEPLOY_HOOK == '' }}
        run: |
          echo "::warning::student.umunsi.com not updated. Add FRONTEND_DEPLOY_TOKEN or VERCEL_TOKEN to GitHub secrets."
          echo "Or use https://studentapi.umunsi.com/app/ (updates when API server pulls main)."

  verify:
    needs: [build, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          sleep 8
          curl -fsS "https://studentapi.umunsi.com/api/health"
          echo ""
          curl -fsS "https://studentapi.umunsi.com/app/" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || true
