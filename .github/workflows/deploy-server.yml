name: Deploy backend (server)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if SSH not configured
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Set SSH_HOST, SSH_USER, SSH_PRIVATE_KEY in repo secrets to auto-deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.BACKEND_APP_DIR || '/var/www/Teacher-s-App-backend' }}"
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            npm ci --omit=dev
            pm2 restart studentapi || pm2 start index.js --name studentapi
            pm2 save

      - name: Health check
        if: steps.check.outputs.skip != 'true'
        run: |
          sleep 5
          curl -fsS https://studentapi.umunsi.com/api/health
