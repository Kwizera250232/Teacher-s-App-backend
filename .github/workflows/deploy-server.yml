name: Deploy backend (server)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require SSH deploy secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Production API was NOT updated. Add GitHub repo secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY (optional: BACKEND_APP_DIR, SSH_PORT)."
            echo "Then re-run this workflow or push to main. Manual: ssh to server, cd app dir, git pull origin main, npm ci --omit=dev, pm2 restart studentapi"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.BACKEND_APP_DIR || '/var/www/Teacher-s-App-backend' }}"
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            npm ci --omit=dev
            pm2 restart studentapi || pm2 start index.js --name studentapi
            pm2 save

      - name: Health check
        if: steps.check.outputs.skip != 'true'
        run: |
          sleep 5
          curl -fsS https://studentapi.umunsi.com/api/health
