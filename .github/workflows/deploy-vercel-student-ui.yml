# Deploy student-web to Vercel (student.umunsi.com) from this repo.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (same Vercel project as Teacher-s-App-frontent).
name: Deploy student UI to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'student-web/**'
      - 'student-web-dist/**'
      - 'vercel.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build student-web
        working-directory: student-web
        run: |
          npm ci
          VITE_API_URL=https://studentapi.umunsi.com/api npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: student-web
          vercel-args: '--prod'
