name: Publish student UI bundle

on:
  push:
    branches: [main]
    paths:
      - 'patches/whatsapp-dashboard-ui/**'
      - 'frontend/**'
      - 'student-web-dist/**'
      - 'scripts/build-student-web-dist.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build UI bundle for /app/
        run: |
          if [ -d frontend ]; then
            bash scripts/build-student-web-dist.sh
          else
            echo "No frontend/ clone — using committed student-web-dist if present"
          fi

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add student-web-dist/
          git diff --staged --quiet || git commit -m "chore: update student-web-dist for /app/ hosting"
          git push
